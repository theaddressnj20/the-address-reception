<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Address — Reception Desk</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --brown:     #3B1F08;
  --brown-mid: #6B3A18;
  --cream:     #F5EFE0;
  --cream-card:#FBF7EF;
  --border:    #D8CABA;
  --muted:     #8C7A66;
  --gold:      #B8965A;
  --gold-l:    #D4B483;
  --green:     #2A6E4E;
  --green-bg:  #EAF5EF;
  --red:       #B52B1E;
  --red-bg:    #FCECEA;
  --orange:    #B86020;
  --orange-bg: #FBF0E5;
  --blue:      #2C4A7A;
  --blue-bg:   #EAF0FA;
  --purple:    #5A2878;
  --purple-bg: #F3EAF9;
  --amber:     #8B6A00;
  --amber-bg:  #FBF5E0;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--brown);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* TOP BAR */
.topbar{height:62px;background:var(--brown);display:flex;align-items:center;justify-content:space-between;padding:0 22px;flex-shrink:0}
.tb-left{display:flex;align-items:center;gap:13px}
.logo{height:36px;filter:brightness(0) invert(1) sepia(1) saturate(.5) brightness(1.15);opacity:.9}
.brand{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--gold-l);letter-spacing:.18em;text-transform:uppercase}
.tb-stats{display:flex;gap:8px}
.sbox{padding:5px 14px;border-radius:8px;text-align:center;min-width:80px}
.sbox.pending{background:rgba(184,150,90,.18)}
.sbox.sdone{background:rgba(42,110,78,.18)}
.sbox-num{display:block;font-size:20px;font-weight:700;line-height:1}
.sbox.pending .sbox-num{color:var(--gold-l)}
.sbox.sdone .sbox-num{color:#6DCFA0}
.sbox-lbl{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;margin-top:1px}
.sbox.pending .sbox-lbl{color:rgba(212,180,131,.5)}
.sbox.sdone .sbox-lbl{color:rgba(109,207,160,.45)}
.tb-right{display:flex;align-items:center;gap:10px}
.add-btn{padding:9px 18px;background:var(--gold);color:var(--brown);border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .18s}
.add-btn:hover{background:var(--gold-l)}
.clock{font-size:12px;font-weight:600;color:rgba(255,255,255,.3);letter-spacing:.06em;min-width:80px;text-align:right}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#6DCFA0;flex-shrink:0;transition:background .3s}
.sync-dot.syncing{background:var(--gold-l)}
.sync-dot.error{background:#E07070}

/* LAYOUT */
.wrap{flex:1;display:flex;overflow:hidden}

/* SIDEBAR */
.sidebar{width:210px;flex-shrink:0;background:var(--brown);display:flex;flex-direction:column;padding:12px 0 16px;overflow-y:auto}
.sb-sec{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.22);padding:10px 16px 4px}
.tab{display:flex;align-items:center;gap:9px;padding:10px 16px;border:none;background:transparent;cursor:pointer;text-align:left;transition:background .15s;position:relative;width:100%}
.tab:hover{background:rgba(255,255,255,.06)}
.tab.on{background:rgba(184,150,90,.16)}
.tab.on::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);border-radius:0 2px 2px 0}
.tab-ico{font-size:15px;flex-shrink:0;width:20px;text-align:center}
.tab-lbl{flex:1;font-size:11px;font-weight:600;color:rgba(255,255,255,.45);line-height:1.3}
.tab.on .tab-lbl{color:var(--gold-l)}
.tab-cnt{font-size:10px;font-weight:700;background:rgba(255,255,255,.1);color:rgba(255,255,255,.4);padding:1px 6px;border-radius:10px;min-width:20px;text-align:center}
.tab.on .tab-cnt{background:var(--gold);color:var(--brown)}
.sb-div{height:1px;background:rgba(255,255,255,.07);margin:6px 14px}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:0}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.list-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--border)}
.list-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--brown)}
.list-meta{display:flex;align-items:center;gap:12px}
.list-count{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.list-date{font-size:11px;font-weight:700;color:var(--muted)}

/* TABLE HEADER */
.tbl-head{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--brown);border-radius:8px 8px 0 0}
.th{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(212,180,131,.5)}

/* MESSAGE ROW */
.msg-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--cream-card);transition:background .15s;position:relative}
.msg-row:last-of-type{border-radius:0 0 8px 8px;border-bottom:1.5px solid var(--border)}
.msg-row:not(.tbl-head)+.msg-row:last-of-type{border-bottom:1.5px solid var(--border)}
.msg-rows-wrap{border:1.5px solid var(--border);border-top:none;border-radius:0 0 8px 8px;overflow:hidden}
.msg-row:hover{background:#F6EFE2}
.msg-row.is-done{opacity:.48}
.msg-row.is-done .row-name,.msg-row.is-done .row-note{text-decoration:line-through}

/* col widths */
.col-cat{width:155px;flex-shrink:0}
.col-name{width:150px;flex-shrink:0}
.col-phone{width:125px;flex-shrink:0}
.col-note{flex:1;min-width:0}
.col-meta{width:105px;flex-shrink:0;text-align:right}
.col-status{width:220px;flex-shrink:0;display:flex;align-items:center;justify-content:flex-end;gap:5px}

.cat-pill{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.pill-rezervasyon{background:var(--blue-bg);color:var(--blue)}
.pill-biggroup{background:var(--orange-bg);color:var(--orange)}
.pill-owner{background:var(--purple-bg);color:var(--purple)}
.pill-callback{background:var(--amber-bg);color:var(--amber)}
.pill-notes{background:var(--green-bg);color:var(--green)}
.pill-catering{background:var(--red-bg);color:var(--red)}

.row-name{font-size:13px;font-weight:700;color:var(--brown);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-phone{font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap}
.row-note{font-size:12px;font-weight:500;color:#6A5A48;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-time{font-size:10px;font-weight:700;color:var(--muted)}
.row-by{font-size:10px;font-weight:600;color:var(--muted);font-style:italic}
.vip-tag{display:inline-flex;align-items:center;gap:2px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:#F5EAF3;color:#7A1A5A;border:1px solid rgba(122,26,90,.2);padding:2px 5px;border-radius:4px;white-space:nowrap}

.prio-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:4px 9px;border-radius:6px;white-space:nowrap}
.prio-high{background:var(--red-bg);color:var(--red)}
.prio-mid{background:var(--orange-bg);color:var(--orange)}
.prio-normal{background:rgba(140,122,102,.1);color:var(--muted)}

.done-btn{padding:5px 10px;border-radius:5px;border:1.5px solid var(--border);background:transparent;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;cursor:pointer;transition:all .18s;color:var(--muted);white-space:nowrap}
.done-btn:hover{border-color:var(--green);color:var(--green)}
.done-btn.is-done{background:var(--green);border-color:var(--green);color:#fff}
.del-btn{padding:5px 8px;border-radius:5px;border:1.5px solid var(--border);background:transparent;font-size:11px;cursor:pointer;color:var(--muted);transition:all .18s}
.del-btn:hover{border-color:var(--red);color:var(--red)}

.loading{padding:48px;text-align:center;opacity:.4}
.loading p{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.empty-state{padding:52px 0;text-align:center;opacity:.35}
.empty-state .ei{font-size:38px;margin-bottom:8px}
.empty-state p{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}

/* CONTACTS TAB */
.contacts-wrap{display:flex;flex-direction:column;gap:20px}
.contact-group{}
.cg-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--brown);margin-bottom:8px;padding-bottom:6px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cg-title-text{display:flex;align-items:center;gap:8px}
.contact-card{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--cream-card);border:1.5px solid var(--border);border-radius:8px;margin-bottom:6px;transition:background .15s}
.contact-card:hover{background:#F6EFE2}
.cc-name{flex:1;font-size:13px;font-weight:700;color:var(--brown)}
.cc-phone{font-size:12px;font-weight:600;color:var(--blue);min-width:140px}
.cc-email{font-size:11px;font-weight:500;color:var(--muted);min-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-note{flex:1;font-size:11px;font-weight:500;color:var(--muted);font-style:italic}
.cc-del{padding:4px 8px;border-radius:5px;border:1.5px solid var(--border);background:transparent;font-size:11px;cursor:pointer;color:var(--muted);transition:all .18s;flex-shrink:0}
.cc-del:hover{border-color:var(--red);color:var(--red)}
.add-contact-btn{padding:7px 14px;border:1.5px dashed var(--border);border-radius:7px;background:transparent;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .18s;width:100%;text-align:center;letter-spacing:.06em}
.add-contact-btn:hover{border-color:var(--gold);color:var(--brown)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(20,8,2,.6);display:flex;align-items:center;justify-content:center;z-index:500;opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--cream);border-radius:14px;width:660px;max-width:96vw;max-height:92vh;overflow-y:auto;padding:24px 24px 20px;transform:translateY(14px);transition:transform .22s;box-shadow:0 24px 64px rgba(20,8,2,.28)}
.overlay.open .modal{transform:translateY(0)}
.m-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.m-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--brown)}
.m-close{width:30px;height:30px;border:1.5px solid var(--border);border-radius:7px;background:transparent;font-size:14px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .18s}
.m-close:hover{border-color:var(--brown);color:var(--brown)}
.m-row{display:flex;gap:10px;margin-bottom:12px}
.m-field{display:flex;flex-direction:column;gap:4px;flex:1}
.m-lbl{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.m-input{padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;background:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--brown);outline:none;width:100%;transition:border-color .2s}
.m-input:focus{border-color:var(--gold)}
.m-textarea{padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;background:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--brown);outline:none;resize:none;width:100%;height:70px;line-height:1.5;transition:border-color .2s}
.m-textarea:focus{border-color:var(--gold)}
.cat-grid{display:flex;flex-wrap:wrap;gap:6px}
.cat-opt{padding:7px 12px;border:1.5px solid var(--border);border-radius:6px;background:transparent;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;color:var(--muted);transition:all .18s}
.cat-opt:hover{border-color:var(--gold-l);color:var(--brown)}
.cat-opt.sel{background:var(--brown);border-color:var(--brown);color:var(--gold-l)}
.prio-grid{display:flex;gap:6px}
.prio-opt{flex:1;padding:8px;border:1.5px solid var(--border);border-radius:6px;background:transparent;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;text-align:center;transition:all .18s;color:var(--muted)}
.prio-opt.p-normal.sel{background:rgba(140,122,102,.1);border-color:var(--muted);color:var(--brown)}
.prio-opt.p-mid.sel{background:var(--orange-bg);border-color:var(--orange);color:var(--orange)}
.prio-opt.p-high.sel{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.vip-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;background:#fff;cursor:pointer;transition:all .18s}
.vip-row:hover{border-color:rgba(122,26,90,.3)}
.vip-row.on{background:#F8EEF5;border-color:rgba(122,26,90,.4)}
.vip-chk{width:19px;height:19px;border:1.5px solid var(--border);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#7A1A5A;flex-shrink:0;transition:all .18s}
.vip-row.on .vip-chk{background:#8B2252;border-color:#8B2252;color:#fff}
.vip-lbl{font-size:12px;font-weight:700;color:var(--muted)}
.vip-row.on .vip-lbl{color:#7A1A5A}
.vip-inp{flex:1;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--brown);background:transparent}
.vip-inp::placeholder{color:rgba(122,26,90,.3)}
.m-foot{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.m-err{font-size:11px;font-weight:700;color:var(--red);display:none}
.m-submit{padding:10px 26px;background:var(--brown);color:var(--gold-l);border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .18s}
.m-submit:hover{background:var(--brown-mid)}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--brown);color:var(--gold-l);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;letter-spacing:.04em;box-shadow:0 8px 24px rgba(20,8,2,.2);opacity:0;transition:all .28s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

// ── CLOCK ──
(function tick(){
  const n = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const timeStr = String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  const dateStr = days[n.getDay()]+', '+months[n.getMonth()]+' '+n.getDate()+' '+n.getFullYear();
  document.getElementById('clock').innerHTML = timeStr+'<br><span style="font-size:9px;opacity:.6">'+dateStr+'</span>';
  setTimeout(tick, 10000);
})();

// ── SYNC DOT ──
function setSyncDot(state){ // 'ok' | 'syncing' | 'error'
  const d = document.getElementById('syncDot');
  d.className = 'sync-dot' + (state !== 'ok' ? ' '+state : '');
  d.title = state === 'ok' ? 'Connected' : state === 'syncing' ? 'Syncing…' : 'Connection error';
}

// ── API ──
async function apiFetch(path, opts={}){
  setSyncDot('syncing');
  try {
    const res = await fetch(SUPA_URL+'/rest/v1/'+path, { headers: HDRS, ...opts });
    if(!res.ok){ const t=await res.text(); throw new Error(t); }
    setSyncDot('ok');
    if(res.status===204) return null;
    return await res.json();
  } catch(e) {
    setSyncDot('error');
    throw e;
  }
}

async function loadMsgs(){
  const data = await apiFetch('messages?order=created_at.desc&select=*');
  msgs = data || [];
}
async function loadContacts(){
  const data = await apiFetch('contacts?order=group_name.asc,name.asc&select=*');
  contacts = data || [];
}

async function init(){
  try {
    await Promise.all([loadMsgs(), loadContacts()]);
    document.getElementById('addBtn').style.display = 'flex';
    render();
    // Poll every 15s for live updates
    polling = setInterval(async ()=>{
      await Promise.all([loadMsgs(), loadContacts()]);
      render();
    }, 15000);
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="empty-state"><div class="ei">⚠️</div><p>Connection failed — check network</p></div>';
  }
}

// ── FILTER ──

  // Show/hide add button based on tab
  const addBtn = document.getElementById('addBtn');
  addBtn.style.display = curFilter === 'contacts' ? 'none' : 'flex';
  render();
}

function sorted(list){
  return [...list].sort((a,b)=>{
    if(a.is_vip!==b.is_vip) return a.is_vip?-1:1;
    const po={high:0,mid:1,normal:2};
    if(po[a.prio]!==po[b.prio]) return po[a.prio]-po[b.prio];
    return new Date(b.created_at)-new Date(a.created_at);
  });
}

function getList(){
  switch(curFilter){
    case 'all':       return sorted(msgs.filter(m=>!m.done));
    case 'pending':   return sorted(msgs.filter(m=>!m.done));
    case 'completed': return sorted(msgs.filter(m=>m.done));
    case 'vip':       return sorted(msgs.filter(m=>m.is_vip));
    case 'urgent':    return sorted(msgs.filter(m=>m.prio==='high'&&!m.done));
    default:          return sorted(msgs.filter(m=>m.cat===curFilter));
  }
}

function updateCounts(){
  const open = msgs.filter(m=>!m.done);
  document.getElementById('s-pending').textContent = open.length;
  document.getElementById('s-done').textContent = msgs.filter(m=>m.done).length;
  document.getElementById('tc-all').textContent = open.length;
  ['rezervasyon','notes','callback','catering','biggroup','owner'].forEach(c=>{
    document.getElementById('tc-'+c).textContent = open.filter(m=>m.cat===c).length;
  });
  document.getElementById('tc-vip').textContent     = msgs.filter(m=>m.is_vip&&!m.done).length;
  document.getElementById('tc-urgent').textContent  = msgs.filter(m=>m.prio==='high'&&!m.done).length;
  document.getElementById('tc-pending').textContent = open.length;
  document.getElementById('tc-completed').textContent = msgs.filter(m=>m.done).length;
  document.getElementById('tc-contacts').textContent  = contacts.length;
}

// ── RENDER ──
function render(){
  updateCounts();
  const content = document.getElementById('content');
  const title = SECTION_TITLES[curFilter]||'Messages';

  if(curFilter === 'contacts'){ renderContacts(content, title); return; }

  const list = getList();
  const today = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  if(!list.length){
    content.innerHTML=`
      <div class="list-header">
        <div class="list-title">${title}</div>
        <div class="list-meta"><span class="list-date">${today}</span><span class="list-count">0 records</span></div>
      </div>
      <div class="empty-state"><div class="ei">📭</div><p>No messages</p></div>`;
    return;
  }

  let html=`
    <div class="list-header">
      <div class="list-title">${title}</div>
      <div class="list-meta">
        <span class="list-date">${today}</span>
        <span class="list-count">${list.length} record${list.length!==1?'s':''}</span>
      </div>
    </div>
    <div class="tbl-head">
      <div class="th col-cat">Category</div>
      <div class="th col-name">Guest</div>
      <div class="th col-phone">Phone</div>
      <div class="th col-note">Note</div>
      <div class="th col-meta">Time · By</div>
      <div class="th col-status" style="text-align:right">Priority &nbsp;&nbsp; Status</div>
    </div>
    <div class="msg-rows-wrap">`;

  html += list.map(m=>{
    const dt = new Date(m.created_at);
    const ts = dt.toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit'})
              +' '+dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    const extras=[];
    if(m.pax) extras.push(m.pax+' pax');
    if(m.requested_date) extras.push(new Date(m.requested_date+'T00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short'}));
    if(m.requested_time) extras.push(m.requested_time);
    const noteStr=[m.note,extras.join(' · ')].filter(Boolean).join(' — ');
    const prioBadge = m.prio==='high'
      ? `<span class="prio-badge prio-high">🔴 Urgent</span>`
      : m.prio==='mid'
      ? `<span class="prio-badge prio-mid">⬆ Important</span>`
      : `<span class="prio-badge prio-normal">Normal</span>`;
    const doneBtn = m.done
      ? `<button class="done-btn is-done" onclick="toggleDone(${m.id},event)">✓ Done</button>`
      : `<button class="done-btn" onclick="toggleDone(${m.id},event)">Mark Done</button>`;
    const vipHtml = m.is_vip
      ? `<span class="vip-tag">⭐${m.known_as?' '+m.known_as:' VIP'}</span> `
      : '';
    return `
<div class="msg-row ${m.done?'is-done':''}" id="mr-${m.id}">
  <div class="col-cat"><span class="cat-pill pill-${m.cat}">${CAT_ICONS[m.cat]||''} ${CAT_LABELS[m.cat]||m.cat}</span></div>
  <div class="col-name">${vipHtml}<span class="row-name">${m.name}</span></div>
  <div class="col-phone"><span class="row-phone">${m.phone||'—'}</span></div>
  <div class="col-note"><span class="row-note">${noteStr||'—'}</span></div>
  <div class="col-meta"><div class="row-time">${ts}</div>${m.taken_by?`<div class="row-by">${m.taken_by}</div>`:''}</div>
  <div class="col-status">
    ${prioBadge}
    <button class="del-btn" onclick="delMsg(${m.id},event)" title="Delete">✕</button>
    ${doneBtn}
  </div>
</div>`;
  }).join('');

  html += '</div>';
  content.innerHTML = html;
}

function renderContacts(content, title){
  const today = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  // Group by group_name
  const groups = {};
  contacts.forEach(c=>{
    const g = c.group_name||'Other';
    if(!groups[g]) groups[g]=[];
    groups[g].push(c);
  });

  let html=`
    <div class="list-header">
      <div class="list-title">${title}</div>
      <div class="list-meta">
        <span class="list-date">${today}</span>
        <button class="add-btn" style="font-size:11px;padding:7px 14px" onclick="openContactModal()">+ Add Contact</button>
      </div>
    </div>
    <div class="contacts-wrap">`;

  const groupIcons = {Staff:'👤',Management:'👔',Supplier:'🚚',Emergency:'🚨',Partner:'🤝'};

  if(!contacts.length){
    html += '<div class="empty-state"><div class="ei">📞</div><p>No contacts yet — add your first one</p></div>';
  } else {
    Object.keys(groups).sort().forEach(g=>{
      const icon = groupIcons[g]||'📋';
      html += `<div class="contact-group">
        <div class="cg-title">
          <div class="cg-title-text">${icon} ${g}</div>
          <button class="add-contact-btn" style="width:auto;padding:4px 12px;font-size:10px" onclick="openContactModal('${g}')">+ Add</button>
        </div>`;
      groups[g].forEach(c=>{
        html += `<div class="contact-card">
          <div class="cc-name">${c.name}</div>
          ${c.phone?`<div class="cc-phone"><a href="tel:${c.phone}" style="color:inherit;text-decoration:none">📞 ${c.phone}</a></div>`:'<div class="cc-phone" style="opacity:.35">—</div>'}
          ${c.email?`<div class="cc-email"><a href="mailto:${c.email}" style="color:inherit;text-decoration:none">✉️ ${c.email}</a></div>`:'<div class="cc-email" style="opacity:.35">—</div>'}
          <div class="cc-note">${c.note||''}</div>
          <button class="cc-del" onclick="delContact(${c.id},event)">✕</button>
        </div>`;
      });
      html += `<button class="add-contact-btn" onclick="openContactModal('${g}')">+ Add to ${g}</button>`;
      html += '</div>';
    });
  }

  html += '</div>';
  content.innerHTML = html;
}

// ── MESSAGE ACTIONS ──
async function toggleDone(id, e){
  e.stopPropagation();
  const m = msgs.find(x=>x.id===id);
  if(!m) return;
  const newDone = !m.done;
  try {
    await apiFetch(`messages?id=eq.${id}`, { method:'PATCH', body: JSON.stringify({done: newDone}) });
    m.done = newDone;
    render();
    showToast(newDone ? '✓ Marked as completed' : '↩ Moved back to pending');
  } catch(e){ showToast('⚠ Error updating — try again'); }
}

async function delMsg(id, e){
  e.stopPropagation();
  if(!confirm('Delete this message?')) return;
  try {
    await apiFetch(`messages?id=eq.${id}`, { method:'DELETE' });
    msgs = msgs.filter(x=>x.id!==id);
    render();
    showToast('Deleted');
  } catch(e){ showToast('⚠ Error deleting'); }
}

// ── SUBMIT MESSAGE ──
async function submitMsg(){
  const name = document.getElementById('f-name').value.trim();
  if(!selCat||!name){
    const e=document.getElementById('m-err');
    e.style.display='block'; setTimeout(()=>e.style.display='none',3000); return;
  }
  const body = {
    cat: selCat, prio: selPrio, name,
    phone: document.getElementById('f-phone').value.trim(),
    pax: document.getElementById('f-pax').value||null,
    requested_date: document.getElementById('f-date').value||null,
    requested_time: document.getElementById('f-time').value||null,
    taken_by: document.getElementById('f-hostes').value.trim()||null,
    note: document.getElementById('f-note').value.trim()||null,
    is_vip: isVip,
    known_as: document.getElementById('vipInp').value.trim()||null,
    done: false
  };
  try {
    const res = await apiFetch('messages', { method:'POST', body: JSON.stringify(body) });
    if(res&&res[0]) msgs.unshift(res[0]);
    closeMsgModal(); resetMsgForm();
    render(); showToast('✓ Message saved');
  } catch(e){ showToast('⚠ Error saving — try again'); }
}

function resetMsgForm(){
  selCat=null; selPrio='normal'; isVip=false;
  document.querySelectorAll('.cat-opt').forEach(b=>b.classList.remove('sel'));
  document.querySelectorAll('.prio-opt').forEach(b=>b.classList.remove('sel'));
  document.querySelector('.prio-opt.p-normal').classList.add('sel');
  document.getElementById('vipRow').classList.remove('on');
  ['f-name','f-phone','f-pax','f-date','f-time','f-hostes','f-note','vipInp']
    .forEach(id=>document.getElementById(id).value='');
}

// ── CONTACTS ──
let prefillGroup = '';
function openContactModal(group=''){
  prefillGroup = group;
  if(group) document.getElementById('c-group').value = group;
  document.getElementById('contactOverlay').classList.add('open');
}
function closeContactModal(){
  document.getElementById('contactOverlay').classList.remove('open');
  ['c-group','c-name','c-phone','c-email','c-note'].forEach(id=>document.getElementById(id).value='');
}

async function submitContact(){
  const name = document.getElementById('c-name').value.trim();
  if(!name){
    const e=document.getElementById('c-err');
    e.style.display='block'; setTimeout(()=>e.style.display='none',3000); return;
  }
  const body = {
    group_name: document.getElementById('c-group').value.trim()||'Other',
    name,
    phone: document.getElementById('c-phone').value.trim()||null,
    email: document.getElementById('c-email').value.trim()||null,
    note:  document.getElementById('c-note').value.trim()||null
  };
  try {
    const res = await apiFetch('contacts', { method:'POST', body: JSON.stringify(body) });
    if(res&&res[0]) contacts.push(res[0]);
    contacts.sort((a,b)=>(a.group_name+a.name).localeCompare(b.group_name+b.name));
    closeContactModal(); render(); showToast('✓ Contact saved');
  } catch(e){ showToast('⚠ Error saving contact'); }
}

async function delContact(id, e){
  e.stopPropagation();
  if(!confirm('Delete this contact?')) return;
  try {
    await apiFetch(`contacts?id=eq.${id}`, { method:'DELETE' });
    contacts = contacts.filter(x=>x.id!==id);
    render(); showToast('Deleted');
  } catch(e){ showToast('⚠ Error deleting'); }
}

// ── MODAL HELPERS ──
function openMsgModal(){ document.getElementById('msgOverlay').classList.add('open'); }
function closeMsgModal(){ document.getElementById('msgOverlay').classList.remove('open'); }
function outsideClose(e,id){ if(e.target===document.getElementById(id)) document.getElementById(id).classList.remove('open'); }
function toggleVip(){ isVip=!isVip; document.getElementById('vipRow').classList.toggle('on',isVip); if(!isVip) document.getElementById('vipInp').value=''; }
function pickCat(el){ document.querySelectorAll('.cat-opt').forEach(b=>b.classList.remove('sel')); el.classList.add('sel'); selCat=el.dataset.c; }
function pickPrio(el){ document.querySelectorAll('.prio-opt').forEach(b=>b.classList.remove('sel')); el.classList.add('sel'); selPrio=el.dataset.p; }

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ── START ──
init();
</script>
</body>
</html>
